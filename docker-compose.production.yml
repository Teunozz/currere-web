services:
  currere:
    image: ${DOCKER_USERNAME:-teunozz}/${DOCKER_IMAGE_NAME:-currere-web}:latest
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_KEY: "${APP_KEY}"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost:8080}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - currere-data:/data
      - currere-storage:/var/www/html/storage
    restart: unless-stopped

volumes:
  currere-data:
  currere-storage:
